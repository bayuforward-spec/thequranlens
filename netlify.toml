# Netlify — hosting frontend statis The Quran Lens
# Frontend ada di root repo (tanpa build step).
[build]
  publish = "."
  command = ""

# Folder server/ adalah kode backend (bukan bagian situs) — diabaikan saat publish.
[build.ignore]
  command = "true"

# Header keamanan dasar
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
