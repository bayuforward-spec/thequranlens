# Render — deploy backend verifikasi langganan (folder server/)
# Catatan: tier free berfilesystem EFEMERAL — file data/subs.json TIDAK persisten
# antar restart/deploy. Untuk uang sungguhan, pasang Disk (berbayar) lalu set
# DATA_FILE ke path disk, ATAU pindah ke database. Lihat DEPLOY-MAYAR.md.
services:
  - type: web
    name: quran-lens-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MAYAR_WEBHOOK_SECRET    # isi manual di dashboard (rahasia, dari Mayar)
        sync: false
      - key: TOKEN_SECRET            # dibuat otomatis & aman oleh Render
        generateValue: true
      - key: MAYAR_WEBHOOK_DEBUG     # set "true" SEMENTARA saat transaksi tes, lalu balik "false"
        value: "false"
      - key: ALLOW_ORIGIN            # domain frontend Anda; "*" boleh untuk awal
        value: "*"
      # --- Google Play Billing (edisi Play Store) — isi manual saat siap ---
      - key: GOOGLE_SA_EMAIL         # email service account (akses Play Developer API)
        sync: false
      - key: GOOGLE_SA_KEY           # private key PEM service account (baris baru = \n)
        sync: false
      - key: PLAY_PACKAGE_NAME       # package name app, mis. id.thequranlens.app
        sync: false
      # Jika memasang Disk persisten, arahkan penyimpanan ke sana:
      # - key: DATA_FILE
      #   value: /var/data/subs.json

    # Aktifkan blok ini bila ingin data langganan persisten (berbayar):
    # disk:
    #   name: quran-lens-data
    #   mountPath: /var/data
    #   sizeGB: 1
